name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lws10-vocab/package-lock.json

      - name: Build vocabulary
        working-directory: lws10-vocab
        run: |
          npm ci
          npm run build

      - name: Convert README to HTML
        uses: docker://pandoc/core:3.8
        with:
          args: >-
            README.md -s
            --metadata title="LWS Protocol"
            --css https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css
            --template .github/pandoc/template.html
            -o index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
